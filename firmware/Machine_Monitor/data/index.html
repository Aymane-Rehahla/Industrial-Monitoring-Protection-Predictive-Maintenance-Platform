<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maintenance Interface</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/screens.css">
</head>
<body>
    <!-- The entire app is now contained in this single screen -->
    <div class="screen-overlay" id="screen-detail" style="display: flex;">

        <div class="d-status-badge" id="d-status-badge">
            <span id="d-status-ar">القيم طبيعية</span>
        </div>

        <div class="d-header">
            <button class="d-back-btn" onclick="Screen.back()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span class="d-title" id="d-title">Bravo 01</span>
            </button>
            <button class="d-turnoff-btn" onclick="App.turnOff && App.turnOff('bravo01')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
            </button>
        </div>

        <div class="d-statsbar">
            <div class="d-stat-item">Runtime: <strong id="d-runtime">--:--:-- h</strong></div>
            <div class="d-stat-sep"></div>
            <div class="d-stat-item">operating ratio: <strong id="d-ratio">--%</strong></div>
            <div class="d-stat-sep"></div>
            <div class="d-stat-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px;"><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m12.72 12.72l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m12.72-12.72l1.41-1.41"></path></svg>
                sensors: <strong id="d-sensors">16</strong>
            </div>
        </div>

        <div class="d-body">
            <div class="d-grid">

                <!-- Cards will be populated by JS -->
                <div class="d-card"><div class="d-card-header"><div class="d-card-left"><div class="d-card-title-row"><span class="d-dot" id="d-cur-dot"></span><span class="d-card-title">current <small>(A)</small></span><span class="d-card-rate">100(ms)</span></div><div class="d-phase-row"><span class="d-val-main" id="d-cur-val">--</span><small class="d-val-unit">A</small><span class="d-phase-badge" id="d-cur-phase">L1 &#9662;</span></div></div></div><div class="d-wave-area"><canvas id="canvas-d-cur" class="d-canvas"></canvas></div><button class="d-drill-btn">&#9654;</button></div>
                <div class="d-card"><div class="d-card-header"><div class="d-card-left"><div class="d-card-title-row"><span class="d-dot" id="d-vlt-dot"></span><span class="d-card-title">Voltage <small>(V)</small></span><span class="d-card-rate">100(ms)</span></div><div class="d-phase-row"><span class="d-val-main" id="d-vlt-val">--</span><small class="d-val-unit">V</small><span class="d-phase-badge" id="d-vlt-phase">L2 &#9662;</span></div></div></div><div class="d-wave-area"><canvas id="canvas-d-vlt" class="d-canvas"></canvas></div><button class="d-drill-btn">&#9654;</button></div>
                <div class="d-card"><div class="d-card-header"><div class="d-card-left"><div class="d-card-title-row"><span class="d-dot" id="d-hum-dot"></span><span class="d-card-title">Heat &amp; humidity</span></div></div></div><div class="d-bars-area"><div class="d-bar-row"><div class="d-bar-track"><div class="d-bar-fill heat" id="d-temp-bar"></div><span class="d-bar-label"><span id="d-temp-val">--</span>°<small>c</small></span></div></div><div class="d-bar-row"><div class="d-bar-track"><div class="d-bar-fill hum" id="d-hum-bar"></div><span class="d-bar-label"><span id="d-hum-val">--</span><small>%</small></span></div></div></div><button class="d-drill-btn">&#9654;</button></div>
                <div class="d-card"><div class="d-card-header"><div class="d-card-left"><div class="d-card-title-row"><span class="d-dot" id="d-vibe-dot"></span><span class="d-card-title">Vibration</span><span class="d-card-rate">100(ms)</span></div><div class="d-vibe-rms">RMS Total : <strong id="d-vibe-rms">-- g</strong></div></div></div><div class="d-vibe-axes"><div class="d-axis"><span class="d-axis-val" id="d-vx-val">--g</span><div class="d-axis-bar-wrap"><div class="d-axis-bar x" id="d-vx-bar"></div></div><span class="d-axis-lbl">X →</span></div><div class="d-axis"><span class="d-axis-val" id="d-vy-val">--g</span><div class="d-axis-bar-wrap"><div class="d-axis-bar y" id="d-vy-bar"></div></div><span class="d-axis-lbl">Y ↑</span></div><div class="d-axis"><span class="d-axis-val" id="d-vz-val">--g</span><div class="d-axis-bar-wrap"><div class="d-axis-bar z" id="d-vz-bar"></div></div><span class="d-axis-lbl">Z ⬚</span></div></div><button class="d-drill-btn">&#9654;</button></div>
                <div class="d-card"><div class="d-card-header"><div class="d-card-left"><div class="d-card-title-row"><span class="d-dot" id="d-sound-dot"></span><span class="d-card-title">Sound <small>(dB)</small></span><span class="d-card-rate">100(ms)</span></div></div></div><div class="d-sound-area"><div class="d-sound-val" id="d-sound-val">--<small>dB</small></div><div class="d-sound-bars" id="d-sound-bars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div><button class="d-drill-btn">&#9654;</button></div>
                <div class="d-card"><div class="d-card-header"><div class="d-card-left"><div class="d-card-title-row"><span class="d-dot" id="d-rpm-dot"></span><span class="d-card-title">Motor Speed</span></div></div></div><div class="d-gauge-area"><div class="d-gauge" id="d-gauge"><svg viewBox="0 0 120 70" class="d-gauge-svg"><defs><linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#34D058"></stop><stop offset="60%" stop-color="#F5C518"></stop><stop offset="100%" stop-color="#FF453A"></stop></linearGradient></defs><path d="M10,65 A55,55 0 0,1 110,65" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="12" stroke-linecap="round"></path><path id="d-gauge-arc" d="M10,65 A55,55 0 0,1 110,65" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="172" stroke-dashoffset="172"></path></svg><div class="d-gauge-center"><strong id="d-rpm-val">--</strong><span>RPM</span></div></div></div><button class="d-drill-btn">&#9654;</button></div>
                <div class="d-card d-card-gases"><div class="d-card-header"><div class="d-card-left"><div class="d-card-title-row"><span class="d-dot" id="d-gas-dot"></span><span class="d-card-title">Gases</span><span class="d-card-rate">100(ms)</span></div></div></div><div class="d-gas-area"><div class="d-gas-boxes"><div class="d-gas-box" id="d-gas-box-mq2"><div class="d-gas-label">MQ2</div><div class="d-gas-val" id="d-mq2">--</div><div class="d-gas-indicator-wrap"><div class="d-gas-indicator" id="d-mq2-ind"></div></div></div><div class="d-gas-box" id="d-gas-box-mq4"><div class="d-gas-label">MQ4</div><div class="d-gas-val" id="d-mq4">--</div><div class="d-gas-indicator-wrap"><div class="d-gas-indicator" id="d-mq4-ind"></div></div></div><div class="d-gas-box" id="d-gas-box-mq9"><div class="d-gas-label">MQ9</div><div class="d-gas-val" id="d-mq9">--</div><div class="d-gas-indicator-wrap"><div class="d-gas-indicator" id="d-mq9-ind"></div></div></div></div><div class="d-gas-avg"><strong id="d-ppm">--</strong><span>PPM AVG</span></div></div><button class="d-drill-btn">&#9654;</button></div>

            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/detail.js"></script>
    <script src="/js/websocket.js"></script>
</body>
</html>
